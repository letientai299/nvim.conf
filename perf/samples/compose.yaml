# Multi-service Docker Compose for a web application stack
# Exercises: anchors, aliases, env interpolation, health checks, networks

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-smoke-check: &smoke-check
  script: |
    set -euo pipefail
    curl -fsS http://api:3000/health
    curl -fsS http://worker:3000/metrics | grep -q "jobs_processed_total"
    redis-cli -u redis://cache:6379/0 ping

x-alert-rule: &alert-rule
  expr: |
    sum by (service) (
      rate(http_requests_total{service=~"api|worker", status!~"2.."}[5m])
    ) > 20

x-json-template: &json-template
  cmd: |
    cat <<'JSON'
    {
      // json5-style payload that generic discovery should install on demand
      dashboard: 'operations',
      widgets: ['errors', 'latency', 'queueDepth'],
    }
    JSON

services:
  api:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        NODE_ENV: production
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://app:${DB_PASSWORD}@db:5432/app
      REDIS_URL: redis://cache:6379/0
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    x-smoke:
      <<: *smoke-check
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  worker:
    <<: *common
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    environment:
      DATABASE_URL: postgres://app:${DB_PASSWORD}@db:5432/app
      REDIS_URL: redis://cache:6379/0
      CONCURRENCY: ${WORKER_CONCURRENCY:-4}
    x-bootstrap:
      <<: *json-template
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy

  db:
    <<: *common
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 5
    shm_size: 256mb

  cache:
    <<: *common
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  observability:
    <<: *common
    image: prom/prometheus:v3.1.0
    profiles: ["ops"]
    x-alert:
      <<: *alert-rule

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  default:
    driver: bridge
