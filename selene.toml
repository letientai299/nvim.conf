std = "vim"
# Uses Lua 5.2 goto/labels which selene's vim std doesn't support.
exclude = ["lua/lib/lazy_ondemand.lua"]

[lints]
# lazy.nvim specs, keymap tables, and plugin configs (lualine, mini.*, etc.)
# all use mixed tables by design: array part for identity, hash part for options.
# This is the standard Neovim Lua idiom, not a bug.
mixed_table = "allow"
# Off by default. Catches deeply branched functions early.
high_cyclomatic_complexity = "warn"
